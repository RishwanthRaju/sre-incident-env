name: sre-incident-env
version: "5.0.0"
description: >
  KubeSRE v5.0 - Production-grade SRE Incident Response environment.
  Autonomous AI agents diagnose and resolve cascading Kubernetes failures
  under temporal pressure. 6 difficulty tiers, dynamic randomised targets,
  shaped rewards, Prometheus metrics, multi-step reasoning enforcement.
entrypoint: server.app:app
type: http
spec_version: "1.0"
author: "Rishwanth Raju"
tags:
  - sre
  - kubernetes
  - incident-response
  - openenv
  - reinforcement-learning
tasks:
  - id: easy
    name: "Pod Latency Spike"
    description: "Thread pool exhaustion on auth pod. Get logs to confirm pod name then restart it."
    max_steps: 12
    grader: "/grade/easy"
    commands: ["get_logs", "get_metrics", "restart_pod"]

  - id: medium
    name: "Database Credential Failure"
    description: "Bad deployment broke DB credentials. Identify bad version via logs then rollback."
    max_steps: 12
    grader: "/grade/medium"
    commands: ["get_logs", "get_metrics", "rollback_deploy"]

  - id: hard
    name: "Layer 7 DDoS Attack"
    description: "DDoS attack saturating ingress with 480k req/s. Find attacker IP in logs then block it."
    max_steps: 12
    grader: "/grade/hard"
    commands: ["get_logs", "get_metrics", "block_ip"]

  - id: extreme
    name: "Java Memory Leak"
    description: "Java process leaking memory on worker node. Use run_top to find PID then kill it."
    max_steps: 12
    grader: "/grade/extreme"
    commands: ["get_logs", "run_top", "kill_process"]

  - id: insane
    name: "Cascading Microservice Failure"
    description: "Cascading OOM: frontend timeouts payment-gateway which cannot reach redis-cache-cluster. Trace full 3-service cascade then flush cache."
    max_steps: 12
    grader: "/grade/insane"
    commands: ["get_logs", "flush_cache"]

  - id: apocalypse
    name: "Multi-Region Catastrophe"
    description: "Simultaneous multi-region outage: DB split-brain plus Layer 7 DDoS plus OOM plus cache failure. Requires 5 coordinated steps across 2 AWS regions. Revenue impact 240k per minute."
    max_steps: 12
    grader: "/grade/apocalypse"
    commands: ["get_logs", "run_top", "block_ip", "flush_cache", "kill_process"]

name: sre-incident-env
version: "5.0.0"
description: "KubeSRE — Production-grade SRE Incident Response environment. Agents resolve cascading Kubernetes failures under temporal pressure across 6 difficulty tiers."
entrypoint: server.app:app
type: http
spec_version: "1.0"
author: "Rishwanth Raju"

tasks:
  - id: easy
    name: "Pod Latency Spike"
    description: "Auth pod thread pool exhausted. Inspect logs, identify the failing pod, then restart the exact pod."
    max_steps: 12
    grader: "/grade/easy"

  - id: medium
    name: "Database Credential Failure"
    description: "A bad deployment broke database credentials. Investigate logs, identify the affected service, then roll back the database deployment."
    max_steps: 12
    grader: "/grade/medium"

  - id: hard
    name: "Layer 7 DDoS Attack"
    description: "Ingress is being flooded by Layer 7 traffic. Read logs, find the attacker IP, then block the exact IP address."
    max_steps: 12
    grader: "/grade/hard"

  - id: extreme
    name: "Java Memory Leak"
    description: "A Java process is exhausting memory on a worker node. Use run_top to locate the runaway PID, then kill the exact process."
    max_steps: 12
    grader: "/grade/extreme"

  - id: insane
    name: "Cascading Microservice Failure"
    description: "A cascading OOM failure spans frontend, payment, and redis. Trace the dependency chain through logs, then flush the redis cache cluster."
    max_steps: 12
    grader: "/grade/insane"

  - id: apocalypse
    name: "Multi-Region Catastrophe"
    description: "A multi-region outage combines DB split-brain, DDoS, OOM, and cache failure across two AWS regions. Coordinate the full recovery sequence and finish by restoring the redis cache layer."
    max_steps: 12
    grader: "/grade/apocalypse"

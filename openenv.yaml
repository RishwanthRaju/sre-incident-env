name: sre-incident-env
version: "5.0.0"
description: "KubeSRE — Production-grade SRE Incident Response environment. Agents resolve cascading Kubernetes failures under temporal pressure across 6 difficulty tiers."
entrypoint: server.app:app
type: http
spec_version: "1.0"
author: "Rishwanth Raju"
tasks:
  - id: easy
    name: "Pod Latency Spike"
    description: "Auth pod thread pool exhausted. Get logs to confirm pod name then restart it."
    max_steps: 12
    grader: "/grade/easy"
  - id: medium
    name: "Database Credential Failure"
    description: "Bad deployment broke DB credentials. Identify via logs then rollback."
    max_steps: 12
    grader: "/grade/medium"
  - id: hard
    name: "Layer 7 DDoS Attack"
    description: "DDoS flooding ingress. Find attacker IP in logs then block it."
    max_steps: 12
    grader: "/grade/hard"
  - id: extreme
    name: "Java Memory Leak"
    description: "Java process leaking memory. Use run_top to find PID then kill it."
    max_steps: 12
    grader: "/grade/extreme"
  - id: insane
    name: "Cascading Microservice Failure"
    description: "OOM cascade: frontend to payment to redis. Trace full chain then flush cache."
    max_steps: 12
    grader: "/grade/insane"
  - id: apocalypse
    name: "Multi-Region Catastrophe"
    description: "DB split-brain plus DDoS plus OOM plus cache failure across 2 AWS regions. 5 coordinated steps required."
    max_steps: 12
    grader: "/grade/apocalypse"
